name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src/
      - name: Mypy type check
        run: mypy src/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Pytest unit tests
        run: pytest tests/unit/ -v --cov=src --cov-report=xml --cov-fail-under=0
        env:
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY || 'change-this-secret-key' }}
