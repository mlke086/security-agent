name: Security Scan

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Bandit SAST
        run: bandit -r src/ -f json -o bandit-report.json
      - name: Safety check
        run: safety check --full-report
        continue-on-error: true
