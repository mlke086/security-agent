# =====================================================================
# SecAgent 生产部署
# 业务配置走 Nacos(由 nacos-config.yaml 维护),docker-compose 只注入
# 启动必须的引导变量。
# =====================================================================

name: secagent

x-bootstrap-env: &bootstrap-env
  # ---- 中间件地址(本地中间件)----
  POSTGRES_HOST: "127.0.0.1"
  POSTGRES_PORT: "5432"
  PG_HOST: "127.0.0.1"
  PG_PORT: "5432"
  PG_DATABASE: "SecAgent"
  PG_USER: "secagent"
  PG_POOL_SIZE: "10"

  REDIS_HOST: "127.0.0.1"
  REDIS_PORT: "6379"

  # ---- Nacos bootstrap ----
  NACOS_SERVER: "http://127.0.0.1:8848"
  NACOS_NAMESPACE: "prod"
  NACOS_GROUP: "SECURITY"
  NACOS_DATA_ID: "security-agent.yaml"

  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  LOG_LEVEL: "INFO"

x-logging: &logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:

  # ============================================================
  # API 网关
  # 启动时序:lifespan init_schema() -> load_nacos_settings() ->
  #          start_nacos_listener() -> uvicorn
  # HEALTHCHECK 只在本服务上,因为其他服务(taskworker/celery)不暴露 HTTP
  # ============================================================
  api:
    image: ${SECAGENT_IMAGE_API:-secagent-api:0.1.0}
    container_name: secagent-api
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      <<: *bootstrap-env
      # 健康检查用的 curl 必须绕过任何代理,直接打 127.0.0.1:8000
      # (entrypoint 里有 no_proxy 但 curl 默认走 HTTPS_PROXY,所以这里显式再写一次)
      no_proxy: "127.0.0.1,localhost,127.0.0.0/8"
      NO_PROXY: "127.0.0.1,localhost,127.0.0.0/8"
    volumes:
      - ./logs/api:/app/logs
    logging: *logging
    healthcheck:
      # --noproxy '*' + -4 强制走 IPv4,避开容器内 http_proxy 把 127.0.0.1
      # 解析成代理自身 localhost 的问题
      test: ["CMD-SHELL", "curl -fsS -4 --noproxy '*' http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ============================================================
  # TaskWorker — vulnscan Redis Stream 消费者
  # ============================================================
  taskworker:
    image: ${SECAGENT_IMAGE_API:-secagent-api:0.1.0}
    container_name: secagent-taskworker
    restart: unless-stopped
    network_mode: host
    command: ["taskworker"]
    env_file:
      - .env
    environment:
      <<: *bootstrap-env
    volumes:
      - ./logs/taskworker:/app/logs
    logging: *logging
    depends_on:
      - api

  # ============================================================
  # Celery worker — HITL 审批超时兜底
  # ============================================================
  celery:
    image: ${SECAGENT_IMAGE_API:-secagent-api:0.1.0}
    container_name: secagent-celery
    restart: unless-stopped
    network_mode: host
    command: ["celery"]
    env_file:
      - .env
    environment:
      <<: *bootstrap-env
      CELERY_CONCURRENCY: "4"
    volumes:
      - ./logs/celery:/app/logs
    logging: *logging
    depends_on:
      - api

  # ============================================================
  # 前端 — nginx + React 静态
  # ============================================================
  frontend:
    image: ${SECAGENT_IMAGE_FRONTEND:-secagent-frontend:0.1.0}
    container_name: secagent-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    depends_on:
      - api
    logging: *logging
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  default:
    name: secagent-net