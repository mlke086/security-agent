# =====================================================================
# Nacos config: 安全 AI Agent 全量配置
# dataId  : security-agent.yaml
# group   : SECURITY
# profile : production  (Nacos 命名空间 prod)
#
# 加载优先级:
#   容器 env > 本文件 > 代码默认值
#
# 修改后,无需重启服务: app 内置 Nacos long-poll,变更后热加载。
# =====================================================================

# ---- LLM ----
LLM_PROVIDER: openai                       # claude | openai | vllm
OPENAI_API_KEY: ""                          # 从 env 覆盖(更安全)
OPENAI_BASE_URL: https://api.deepseek.com/v1
OPENAI_MODEL: deepseek-chat

# ---- Kafka ----
KAFKA_BOOTSTRAP_SERVERS: 127.0.0.1:9092
KAFKA_TOPIC_RAW_ALERTS: raw-alerts
KAFKA_TOPIC_DLQ: dead-letter-queue
KAFKA_CONSUMER_GROUP: security-agent-group

# ---- Milvus ----
MILVUS_HOST: 127.0.0.1
MILVUS_PORT: 19530
MILVUS_COLLECTION: threat_intel
MILVUS_SCORE_THRESHOLD: 0.65

# ---- Neo4j ----
NEO4J_URI: bolt://127.0.0.1:7687
NEO4J_USER: neo4j
NEO4J_PASSWORD: ""                         # 从 env 覆盖

# ---- Redis ----
REDIS_URL: redis://:@127.0.0.1:6379/0      # 从 env 覆盖密码
REDIS_CACHE_TTL: 3600

# ---- Elasticsearch ----
ES_HOSTS: http://127.0.0.1:9200
ES_INDEX_AUDIT: security-agent-audit
ES_INDEX_EVENTS: security-agent-events

# ---- 威胁情报 API(可选)----
VIRUSTOTAL_API_KEY: ""
ALIENVAULT_OTX_API_KEY: ""

# ---- 审批通知(可选)----
WECHAT_WORK_WEBHOOK: ""
DINGTALK_WEBHOOK: ""

# ---- API / JWT ----
API_SECRET_KEY: ""                          # 强制从 env 注入,长度 >= 32
API_ACCESS_TOKEN_EXPIRE_MINUTES: 120
API_REFRESH_TOKEN_EXPIRE_DAYS: 7
API_HOST: 0.0.0.0
API_PORT: 8000

# ---- PostgreSQL ----
PG_HOST: 127.0.0.1
PG_PORT: 5432
PG_DATABASE: SecAgent
PG_USER: secagent
PG_PASSWORD: ""                             # 从 env 覆盖
PG_POOL_SIZE: 10

# ---- Agent / 漏洞扫描引擎 ----
AGENT_CONSOLE_EXTERNAL_URL: ""              # Agent 端的回调地址,形如 https://server:8000
AGENT_TLS_CERT: ""
AGENT_TLS_KEY: ""
AGENT_CA_CERT: ""
AGENT_SIGNING_KEY: ""                       # 64 hex,首次启动随机生成后写库
AGENT_HMAC_KEY: ""                          # 任意字符串
AGENT_DEBUG: false
AGENT_HEARTBEAT_INTERVAL: 60
AGENT_BINARY_DIR: deployments/agent/dist
RULES_SYNC_SOURCE: nvd                      # nvd | github
RULES_SYNC_CRON: "0 3 * * *"

# ---- 规则数据源 ----
NVD_API_KEY: ""                             # 强烈建议配,否则限速 5 req/30s
NVD_PROXY: ""                               # http://192.168.254.121:7897
ADVISORY_LOOKBACK_DAYS: 30

# ---- 种子用户密码(>=12 位,生产必须改)----
# 这五个变量只在数据库为空时生效;已有用户不会被覆盖。
DEV_MODE: false
DEFAULT_ADMIN_PASSWORD: ""                  # 由 env 注入
DEFAULT_ANALYST_PASSWORD: ""
DEFAULT_VIEWER_PASSWORD: ""
DEFAULT_RESPONDER_PASSWORD: ""

# ---- 沙箱 ----
SANDBOX_CONTAINER_POOL_SIZE: 5
SANDBOX_EXEC_TIMEOUT_SEC: 60
SANDBOX_NETWORK: sandbox-net

# ---- 日志 ----
LOG_LEVEL: INFO

# ---- Nacos 自身(用于 self-bootstrap)----
# 如果 NACOS_SERVER 留空,app 不启用 Nacos,所有配置直接走 env;
# 一旦配置非空,所有未被 env 显式注入的 key 都会从 Nacos 拉取。
NACOS_SERVER: ""                            # 形如 http://127.0.0.1:8848
NACOS_DATA_ID: security-agent.yaml
NACOS_GROUP: SECURITY
NACOS_NAMESPACE: prod
NACOS_USERNAME: nacos
NACOS_PASSWORD: ""
