# Nginx for Security-Agent Frontend
# - 提供 React 静态文件(SPA history fallback -> index.html)
# - /api 反代到后端(容器名 secagent-api:8000)
# - /healthz 容器内自检

upstream secagent_api {
    server secagent-api:8000;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 客户端上传的最大体积(配合前端大文件 / 报告导出)
    client_max_body_size 50m;

    # gzip
    gzip on;
    gzip_min_length 1k;
    gzip_types text/plain text/css application/json application/javascript
               application/xml application/xml+rss application/atom+xml
               image/svg+xml application/wasm;

    # 反向代理 /api -> 后端
    location /api/ {
        proxy_pass         http://secagent_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # WebSocket(/api/v1/agents/ws)
    location /api/v1/agents/ws {
        proxy_pass         http://secagent_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_read_timeout 86400s;
    }

    # SSE(/api/v1/events/.../stream 等长连接)
    location ~ ^/api/v1/.*/stream$ {
        proxy_pass         http://secagent_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400s;
    }

    # 容器自检
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA history fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源长缓存
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # 安全 header
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
}
