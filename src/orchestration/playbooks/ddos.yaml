playbook_id: ddos
description: "DDoS \u2014 rate limit and block"
trigger:
  verdict: true_positive
  event_tags: ["ddos", "network_attack"]
  confidence_min: 0.75
max_level: L3
operations:
- type: notify
  level: L1
  params:
    channel: soc
- type: rate_limit
  level: L3
  params:
    ip: '{source_ip}'
    rate: 100/s
- type: firewall_block
  level: L3
  params:
    ip: '{source_ip}'
    duration: 3600
