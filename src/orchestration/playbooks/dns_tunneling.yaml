playbook_id: dns_tunneling
description: "DNS tunneling \u2014 block domain"
trigger:
  verdict: true_positive
  event_tags: ["dns", "anomaly"]
  confidence_min: 0.7
max_level: L3
operations:
- type: notify
  level: L1
  params:
    channel: soc
- type: dns_block
  level: L3
  params:
    domain: '{domain}'
